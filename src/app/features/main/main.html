<section class="w-full">
  <article class="relative w-full overflow-hidden">
    <figure class="grid grid-cols-1 md:grid-cols-2">
      <img
        src="/images/home-1-1.jpg"
        alt="prenda mujer 1"
        class="block h-[54svh] min-h-80 w-full object-cover object-center sm:h-[62svh] md:h-[88svh] lg:h-svh"
      />
      <img
        src="/images/home-1-2.jpg"
        alt="prenda mujer 2"
        class="block h-[54svh] min-h-80 w-full object-cover object-center sm:h-[62svh] md:h-[88svh] lg:h-svh"
      />
    </figure>

    <span
      aria-hidden="true"
      class="absolute inset-0 bg-linear-to-r from-black/55 via-black/20 to-transparent"
    ></span>

    <header
      class="pointer-events-none fixed bottom-10 left-1/2 z-30 w-full max-w-480 -translate-x-1/2 px-5 sm:bottom-14 sm:px-6 md:bottom-20 md:px-10 lg:bottom-24 lg:px-12"
    >
      <p
        class="max-w-2xl text-[11px] uppercase tracking-[0.28em] text-white drop-shadow-[0_8px_24px_rgba(0,0,0,0.55)] sm:text-sm sm:tracking-[0.3em]"
      >
        Nueva temporada
      </p>
      <h1
        class="mt-3 max-w-2xl text-3xl font-bold uppercase leading-none tracking-[0.08em] text-white drop-shadow-[0_12px_32px_rgba(0,0,0,0.6)] sm:mt-4 sm:text-4xl md:text-5xl lg:text-6xl"
      >
        Bold Style Revolution
      </h1>
    </header>
  </article>

  <section
    class="grid w-full grid-cols-[repeat(auto-fit,minmax(280px,1fr))]"
    aria-label="Seleccion editorial"
  >
    <img src="/images/home-2-1.jpg" alt="prenda hombre 1" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
    <img src="/images/home2-3.jpg" alt="prenda hombre 2" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
    <img src="/images/home-2-2.jpg" alt="prenda hombre 3" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
    <img src="/images/home2-4.jpg" alt="prenda hombre 4" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
  </section>

  <section
    class="grid w-full grid-cols-1 md:grid-cols-2"
    aria-label="Seleccion editorial dos"
  >
    <img src="/images/home-3-1.jpg" alt="imagen de niños" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
    <img src="/images/home-3-2.jpg" alt="imagen de niñas" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
  </section>

  <section
    class="grid w-full grid-cols-1 md:grid-cols-2 xl:grid-cols-4"
    aria-label="Seleccion editorial tres"
  >
    <img src="/images/home-4-1.jpg" alt="imagen de cartera" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
    <img src="/images/home-4-2.jpg" alt="imagen de zapatos" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
    <img src="/images/home-4-3.jpg" alt="imagen de aretes" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
    <img src="/images/home-4-4.jpg" alt="imagen de cartera" class="block h-[55svh] w-full object-cover md:h-[72svh]" />
  </section>

</section>
