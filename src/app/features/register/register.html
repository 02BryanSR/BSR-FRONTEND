<section class="auth-page">
  <article
    class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-3xl flex-col justify-center rounded-2xl bg-white p-8 shadow-[0_8px_24px_rgba(0,0,0,0.08)] lg:p-12"
  >
    <h1 class="mt-3 text-[32px] font-semibold leading-10.5 text-ink-900">CREAR CUENTA</h1>
  

    <form class="mt-8 space-y-5" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="grid gap-5 md:grid-cols-2">
        <label class="block">
          <span class="form-helper-label">Nombre</span>
          <input
            type="text"
            formControlName="name"
            class="auth-input"
          />
        </label>

        <label class="block">
          <span class="form-helper-label">Apellidos</span>
          <input
            type="text"
            formControlName="lastName"
            class="auth-input"
          />
        </label>
      </div>

      <label class="block">
        <span class="form-helper-label">E-mail</span>
        <input
          type="email"
          formControlName="email"
          class="auth-input"
        />
      </label>

      <label class="block">
        <span class="form-helper-label">Contraseña</span>
        <div
          class="flex items-center rounded-md border border-neutral-200 bg-white px-4 transition focus-within:border-surface-product"
        >
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            class="min-w-0 flex-1 py-3 pr-3 text-sm focus:outline-none"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="icon-button-muted"
            aria-label="Mostrar u ocultar contraseña"
          >
            <app-icon name="eye" class="h-4 w-4"></app-icon>
          </button>
        </div>
        <span class="mt-2 block text-xs text-neutral-400">Mínimo 6 caracteres.</span>
      </label>

      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="inline-flex w-full items-center justify-center rounded-md bg-surface-media px-5 py-3 font-medium text-black transition-colors hover:bg-surface-product disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isSubmitting() ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <div class="mt-8 flex flex-wrap gap-3">
      <a
        routerLink="/login"
        class="auth-link-secondary"
      >
        Volver a login
      </a>
      <a
        routerLink="/forgot-password"
        class="auth-link-secondary"
      >
        Recuperar contraseña
      </a>
    </div>
  </article>
</section>
