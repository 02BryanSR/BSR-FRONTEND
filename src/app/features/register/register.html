<section class="min-h-screen bg-neutral-100 px-6 py-10 lg:px-10">
  <article
    class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-3xl flex-col justify-center rounded-2xl bg-white p-8 shadow-[0_8px_24px_rgba(0,0,0,0.08)] lg:p-12"
  >
    <p class="text-sm font-medium uppercase tracking-wider text-neutral-600">Auth</p>
    <h1 class="mt-3 text-[32px] font-semibold leading-10.5 text-ink-900">Crear cuenta</h1>
    <p class="mt-4 max-w-2xl text-sm text-neutral-600">
      Esta pantalla ya está conectada a tu backend y, cuando el registro sea correcto, iniciará
      sesión automáticamente y redirigirá al área privada.
    </p>

    <form class="mt-8 space-y-5" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="grid gap-5 md:grid-cols-2">
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-neutral-600">Nombre</span>
          <input
            type="text"
            formControlName="name"
            class="w-full rounded-md border border-neutral-200 px-4 py-3 text-sm focus:border-surface-product focus:outline-none"
          />
        </label>

        <label class="block">
          <span class="mb-2 block text-sm font-medium text-neutral-600">Apellidos</span>
          <input
            type="text"
            formControlName="lastName"
            class="w-full rounded-md border border-neutral-200 px-4 py-3 text-sm focus:border-surface-product focus:outline-none"
          />
        </label>
      </div>

      <label class="block">
        <span class="mb-2 block text-sm font-medium text-neutral-600">E-mail</span>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-md border border-neutral-200 px-4 py-3 text-sm focus:border-surface-product focus:outline-none"
        />
      </label>

      <label class="block">
        <span class="mb-2 block text-sm font-medium text-neutral-600">Contraseña</span>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-md border border-neutral-200 px-4 py-3 text-sm focus:border-surface-product focus:outline-none"
        />
        <span class="mt-2 block text-xs text-neutral-400">Mínimo 6 caracteres.</span>
      </label>

      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="inline-flex w-full items-center justify-center rounded-md bg-surface-media px-5 py-3 font-medium text-black transition-colors hover:bg-surface-product disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isSubmitting() ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <div class="mt-8 flex flex-wrap gap-3">
      <a
        routerLink="/login"
        class="inline-flex items-center justify-center rounded-md border border-neutral-200 px-5 py-3 font-medium text-neutral-600 transition-colors hover:bg-neutral-100"
      >
        Volver a login
      </a>
      <a
        routerLink="/forgot-password"
        class="inline-flex items-center justify-center rounded-md border border-neutral-200 px-5 py-3 font-medium text-neutral-600 transition-colors hover:bg-neutral-100"
      >
        Recuperar contraseña
      </a>
    </div>
  </article>
</section>
