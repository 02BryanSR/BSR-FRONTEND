<footer class="border-t border-black/10 bg-surface-media px-4 py-8 text-black sm:px-6 md:px-10 lg:px-12.5">
  <section #footerSection class="mx-auto max-w-7xl">
    <div class="grid gap-3 border-b border-black/10 pb-8 sm:grid-cols-2 sm:gap-4 xl:grid-cols-5 xl:gap-8">
      @for (link of links; track link.panelId) {
        <button
          type="button"
          class="flex w-full flex-col items-start gap-3 rounded-[1.35rem] text-left transition md:gap-4"
          [attr.aria-expanded]="activePanel() === link.panelId"
          (click)="togglePanel(link.panelId)"
        >
          <span class="px-1 text-[11px] font-semibold uppercase tracking-[0.24em] text-black md:px-0">
            {{ link.title }}
          </span>

          <span
            class="flex w-full items-center justify-between rounded-[1.35rem] border border-black/10 bg-white/80 px-4 py-4 text-[12px] uppercase tracking-[0.18em] text-black/75 transition hover:border-black hover:text-black md:inline-flex md:w-auto md:justify-start md:gap-3 md:rounded-none md:border-0 md:bg-transparent md:px-0 md:py-0"
            [class.text-black]="activePanel() === link.panelId"
          >
            <span>{{ link.label }}</span>
            <span
              class="text-[10px] transition-transform duration-200"
              [class.rotate-45]="activePanel() === link.panelId"
            >
              +
            </span>
          </span>
        </button>
      }
    </div>

    @if (activePanelContent(); as panel) {
      <div
        #panelContent
        class="mt-6 scroll-mt-6 rounded-3xl border border-black/10 bg-white px-4 py-5 shadow-[0_18px_40px_rgba(15,23,42,0.08)] sm:px-5 md:rounded-[1.75rem] md:px-7 md:py-6"
      >
        <div class="flex flex-col gap-5">
          <div class="w-full">
            <p class="text-[11px] uppercase tracking-[0.28em] text-black/45">
              {{ panel.kicker }}
            </p>
            <h2 class="mt-3 text-lg font-semibold uppercase tracking-[0.12em] text-black sm:text-xl">
              {{ panel.title }}
            </h2>

            @for (paragraph of panel.paragraphs; track paragraph) {
              <p class="mt-3 text-sm leading-7 text-black/65">
                {{ paragraph }}
              </p>
            }
          </div>

          <button
            type="button"
            class="inline-flex h-11 w-full items-center justify-center rounded-full border border-black/10 px-5 text-[11px] uppercase tracking-[0.2em] text-black transition hover:border-black hover:bg-black hover:text-white sm:w-auto sm:self-end"
            (click)="togglePanel(panel.id)"
          >
            Cerrar
          </button>
        </div>
      </div>
    }
  </section>
</footer>
