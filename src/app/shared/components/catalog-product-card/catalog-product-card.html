<article
  class="group flex h-full cursor-pointer flex-col transition duration-300 hover:-translate-y-1"
  tabindex="0"
  role="link"
  [attr.aria-label]="'Abrir detalle de ' + product().name"
  (click)="openProductDetail()"
  (keydown)="handleKeydown($event)"
>
  <div
    class="relative overflow-hidden rounded-[1.35rem] bg-surface-soft shadow-[0_18px_45px_rgba(15,23,42,0.08)]"
    [class]="mediaClasses()"
  >
    @if (product().imageUrl && !imageBroken()) {
      <img
        [src]="product().imageUrl"
        [alt]="product().name"
        (error)="markImageAsBroken()"

        
        class="h-full w-full object-cover object-center transition duration-500 group-hover:scale-[1.02]"
      />
    } @else {
      <div class="flex h-full items-center justify-center bg-surface-soft px-5 text-center text-xs uppercase tracking-[0.24em] text-neutral-500">
        Sin imagen
      </div>
    }

    <button
      type="button"
      (click)="toggleFavorite($event)"
      class="absolute right-4 top-4 inline-flex h-9 min-w-9 items-center justify-center rounded-full border border-white/35 bg-black/15 px-3 text-[10px] uppercase tracking-[0.2em] text-white backdrop-blur-md transition hover:bg-black/55"
    >
      {{ isFavorite() ? 'Saved' : 'Save' }}
    </button>
  </div>

  <div class="flex flex-1 items-end justify-between gap-4 px-1 pb-1" [class]="bodyClasses()">
    <div class="min-w-0">
      <p class="text-[10px] uppercase tracking-[0.24em] text-neutral-500">Producto</p>
      <h3
        class="mt-2 line-clamp-2 font-semibold uppercase tracking-[0.06em] text-neutral-950"
        [class]="titleClasses()"
      >
        {{ product().name }}
      </h3>
      <strong class="mt-2 block text-sm font-medium text-neutral-900 md:text-base">
        {{
          product().price !== null
            ? (product().price | currency: 'EUR' : 'symbol' : '1.0-2' : 'es')
            : 'Consultar'
        }}
      </strong>
    </div>

    <button
      type="button"
      [disabled]="busy()"
      (click)="requestAdd($event)"
      class="inline-flex h-10 min-w-10 shrink-0 items-center justify-center border border-black/15 bg-white text-lg text-black transition hover:border-black hover:bg-black hover:text-white disabled:cursor-not-allowed disabled:opacity-40"
    >
      +
    </button>
  </div>
</article>
