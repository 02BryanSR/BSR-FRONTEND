<section class="w-full px-6 pb-16 pt-28 md:px-10 lg:px-12.5">
  <div class="mx-auto max-w-7xl space-y-8">
    <article
      class="overflow-hidden rounded-4xl bg-shell-975 text-white shadow-[0_30px_90px_rgba(0,0,0,0.35)]"
    >
      <div class="grid lg:grid-cols-[1.15fr_0.85fr]">
        <figure class="relative min-h-168 overflow-hidden md:min-h-216">
          <img
            [src]="heroImage()"
            [alt]="heroAlt()"
            class="absolute inset-0 h-full w-full object-cover"
          />
          <div
            aria-hidden="true"
            class="absolute inset-0 bg-linear-to-r from-black/75 via-black/35 to-black/15"
          ></div>

          <figcaption class="absolute inset-x-0 bottom-0 p-8 md:p-10">
            <p class="text-[11px] uppercase tracking-[0.3em] text-white/70">{{ eyebrow() }}</p>
            <h1
              class="mt-4 max-w-xl text-4xl font-bold uppercase tracking-[0.12em] md:text-5xl lg:text-6xl"
            >
              {{ title() }}
            </h1>
            <p class="mt-4 max-w-2xl text-sm leading-7 text-white/80 md:text-base">
              {{ description() }}
            </p>
          </figcaption>
        </figure>

        <div class="flex flex-col justify-between gap-10 bg-shell-900 p-8 md:p-10">
          <div>
            <p class="text-[11px] uppercase tracking-[0.3em] text-white/55">{{ accent() }}</p>

            <div class="mt-6 grid gap-4 sm:grid-cols-3 lg:grid-cols-1">
              @for (highlight of highlights(); track highlight) {
                <article class="rounded-3xl border border-white/10 bg-white/5 p-5">
                  <p class="text-xs uppercase tracking-[0.22em] text-white/45">Clave</p>
                  <p class="mt-3 text-sm font-medium uppercase tracking-[0.15em] text-white">
                    {{ highlight }}
                  </p>
                </article>
              }
            </div>
          </div>

          <div class="flex flex-wrap gap-3">
            <a
              routerLink="/home"
              class="inline-flex items-center justify-center rounded-full border border-white/25 px-6 py-3 text-xs uppercase tracking-[0.25em] text-white transition hover:border-white hover:bg-white hover:text-black"
            >
              Volver a home
            </a>
            <a
              routerLink="/login"
              class="inline-flex items-center justify-center rounded-full bg-white px-6 py-3 text-xs uppercase tracking-[0.25em] text-black transition hover:bg-white/90"
            >
              Iniciar sesión
            </a>
          </div>
        </div>
      </div>
    </article>

    <section class="grid gap-5 md:grid-cols-3" aria-label="Bloques destacados">
      @for (panel of panels(); track panel.title) {
        <article
          class="rounded-[1.75rem] border border-black/10 bg-white/85 p-6 text-neutral-900 shadow-[0_16px_40px_rgba(15,23,42,0.08)] backdrop-blur"
        >
          <p class="text-[11px] uppercase tracking-[0.28em] text-neutral-500">
            {{ panel.eyebrow }}
          </p>
          <h2 class="mt-4 text-2xl font-semibold uppercase tracking-widest">
            {{ panel.title }}
          </h2>
          <p class="mt-4 text-sm leading-7 text-neutral-600">
            {{ panel.description }}
          </p>
        </article>
      }
    </section>

    <section class="grid gap-5 md:grid-cols-2 xl:grid-cols-3" aria-label="Galeria editorial">
      @for (image of gallery(); track image.src) {
        <figure class="group relative overflow-hidden rounded-[1.75rem] bg-neutral-950">
          <img
            [src]="image.src"
            [alt]="image.alt"
            class="h-88 w-full object-cover transition duration-500 group-hover:scale-105"
          />
          <div
            aria-hidden="true"
            class="absolute inset-0 bg-linear-to-t from-black/60 via-black/10 to-transparent"
          ></div>
          <figcaption class="absolute inset-x-0 bottom-0 p-6">
            <p class="text-sm uppercase tracking-[0.2em] text-white/85">{{ title() }}</p>
            <p class="mt-2 text-xs uppercase tracking-[0.2em] text-white/65">
              {{ image.caption }}
            </p>
          </figcaption>
        </figure>
      }
    </section>
  </div>
</section>
