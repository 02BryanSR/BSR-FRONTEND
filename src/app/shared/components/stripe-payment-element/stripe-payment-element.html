<div class="stack-6">
  <section class="space-y-5 rounded-[1.6rem] border border-black/10 bg-white p-4 sm:p-5 md:p-6 xl:p-8">
    <div class="space-y-4">
      <div>
        <p class="section-eyebrow">Completa los detalles de pago</p>
      </div>

      <div class="flex flex-wrap items-center gap-2 text-[11px] font-semibold uppercase tracking-[0.2em]">
        @for (brand of brands; track brand.key) {
          <button
            type="button"
            class="min-w-24 rounded-full border px-3 py-2 text-center transition sm:min-w-0"
            [ngClass]="
              selectedBrand() === brand.key
                ? 'border-black bg-black text-white'
                : 'border-black/10 text-neutral-500'
            "
            (click)="selectBrand(brand.key)"
          >
            {{ brand.label }}
          </button>
        }
      </div>
    </div>

    <div class="grid gap-4 rounded-[1.4rem] border border-black/10 bg-surface-panel p-3 sm:p-4 md:p-5">
      <label class="form-field">
        <span class="text-body-strong">Numero de tarjeta</span>
        @if (mode === 'demo') {
          <input
            type="text"
            [value]="demoCardNumber()"
            class="form-control form-control--white form-control--lg"
            autocomplete="cc-number"
            inputmode="numeric"
            (input)="onDemoCardNumberInput($event)"
          />
        } @else {
          <div class="form-shell">
            <div #cardNumberHost class="min-h-5.5"></div>
          </div>
        }
      </label>

      <div class="form-grid-2">
        <label class="form-field">
          <span class="text-body-strong">Fecha de caducidad</span>
          @if (mode === 'demo') {
            <input
              type="text"
              [value]="demoExpiry()"
              class="form-control form-control--white form-control--lg"
              autocomplete="cc-exp"
              inputmode="numeric"
              (input)="onDemoExpiryInput($event)"
            />
          } @else {
            <div class="form-shell">
              <div #cardExpiryHost class="min-h-5.5"></div>
            </div>
          }
        </label>

        <label class="form-field">
          <span class="text-body-strong">Codigo de seguridad</span>
          @if (mode === 'demo') {
            <input
              type="text"
              [value]="demoCvc()"
              class="form-control form-control--white form-control--lg"
              autocomplete="cc-csc"
              inputmode="numeric"
              (input)="onDemoCvcInput($event)"
            />
          } @else {
            <div class="form-shell">
              <div #cardCvcHost class="min-h-5.5"></div>
            </div>
          }
        </label>
      </div>
    </div>

    @if (mode === 'stripe' && loading()) {
      <p class="text-muted">Cargando formulario seguro...</p>
    }

    @if (errorMessage()) {
      <div class="rounded-[1.1rem] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }
  </section>
</div>
